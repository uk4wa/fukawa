name: pet-uk4wa

services:
  db:
    image: postgres:18
    environment:
      - POSTGRES_DB=$DB__NAME
      - POSTGRES_USER=$DB__USER
      - POSTGRES_PASSWORD=$DB__PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $DB__USER -d $DB__NAME"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    environment:
      APP_NAME: $APP_NAME
      DB__HOST: db
      DB__PORT: $DB__PORT
      DB__NAME: $DB__NAME
      DB__USER: $DB__USER
      DB__PASSWORD: $DB__PASSWORD
      DB_URL: $DB_URL
    restart: no
    depends_on:
      db:
        condition: service_healthy

  app:
    build: 
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    environment:
      APP_NAME: $APP_NAME
      DB__HOST: db
      DB__PORT: $DB__PORT
      DB__NAME: $DB__NAME
      DB__USER: $DB__USER
      DB__PASSWORD: $DB__PASSWORD
      DB_URL: $DB_URL
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

      
volumes:
  pgdata:

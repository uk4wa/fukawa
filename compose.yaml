name: ${APP_NAME}

services:
  db:
    image: postgres:18
    environment:
      - POSTGRES_DB=$DB__NAME
      - POSTGRES_USER=$DB__USER
      - POSTGRES_PASSWORD=$DB__PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $DB__USER -d $DB__NAME"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    environment:
      APP_NAME: $APP_NAME
      LOG_FORMAT: $LOG_FORMAT
      LOG_LEVEL: $LOG_LEVEL
      DB__HOST: db
      DB__DRIVER: $DB__DRIVER
      DB__PORT: $DB__PORT
      DB__NAME: $DB__NAME
      DB__USER: $DB__USER
      DB__PASSWORD: $DB__PASSWORD
    restart: no
    depends_on:
      db:
        condition: service_healthy

  app:
    build: 
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    environment:
      APP_NAME: $APP_NAME
      LOG_FORMAT: $LOG_FORMAT
      LOG_LEVEL: $LOG_LEVEL
      DB__HOST: db
      DB__DRIVER: $DB__DRIVER
      DB__PORT: $DB__PORT
      DB__NAME: $DB__NAME
      DB__USER: $DB__USER
      DB__PASSWORD: $DB__PASSWORD
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
